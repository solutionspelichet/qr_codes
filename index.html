<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pelichet | Logistics Labels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center justify-center font-sans">

    <div class="max-w-2xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <div class="bg-[#002e5d] p-8 text-white text-center">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase">Pelichet</h1>
            <p class="text-blue-200 text-xs font-bold tracking-widest mt-1">LOGISTICS LABEL GENERATOR</p>
        </div>
        
        <form id="labelForm" class="p-8 space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">1. Fichier de données</label>
                <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">2. Modèle d'étiquette</label>
                    <select id="preset" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-medium" onchange="toggleCustom()">
                        <optgroup label="HERMA">
                            <option value="HERMA_4270">Herma 4270 (2x4 - 99.1x67.7mm)</option>
                            <option value="HERMA_4676">Herma 4676 (3x8 - 70x29.7mm)</option>
                            <option value="HERMA_4457">Herma 4457 (4x10 - 48.3x25.4mm)</option>
                            <option value="HERMA_4428">Herma 4428 (2x6 - 105x48mm)</option>
                        </optgroup>
                        <optgroup label="AVERY / AGIPA">
                            <option value="AVERY_L7159">Avery L7159 (3x8 - 63.5x33.9mm)</option>
                            <option value="AVERY_L7160">Avery L7160 (3x7 - 63.5x38.1mm)</option>
                            <option value="AVERY_L7163">Avery L7163 (2x7 - 99.1x38.1mm)</option>
                        </optgroup>
                        <option value="CUSTOM">-- FORMAT SUR MESURE (Autre référence) --</option>
                    </select>
                </div>

                <div id="customFields" class="col-span-2 hidden grid grid-cols-4 gap-2 p-5 bg-blue-50 rounded-2xl border border-blue-100 animate-pulse">
                    <div><label class="text-[9px] font-bold">L mm</label><input type="number" id="custW" value="99.1" class="w-full p-2 rounded"></div>
                    <div><label class="text-[9px] font-bold">H mm</label><input type="number" id="custH" value="67.7" class="w-full p-2 rounded"></div>
                    <div><label class="text-[9px] font-bold">Col</label><input type="number" id="custCols" value="2" class="w-full p-2 rounded"></div>
                    <div><label class="text-[9px] font-bold">Lig</label><input type="number" id="custRows" value="4" class="w-full p-2 rounded"></div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">3. Type de code</label>
                    <select id="type" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                        <option value="Code128">Barcode 128</option>
                        <option value="QR">QR Code</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">4. Texte</label>
                    <select id="textPos" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                        <option value="dessous">Dessous</option>
                        <option value="dessus">Dessus</option>
                        <option value="none">Masqué</option>
                    </select>
                </div>
                
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-blue-600 uppercase ml-1 font-black underline">5. Email pour réception PDF</label>
                    <input type="email" id="userEmail" class="w-full p-4 border border-blue-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="votre@email.com">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-[#002e5d] text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-900 transition-all flex justify-center items-center">
                <span id="btnText">GÉNÉRER SUR GOOGLE DRIVE</span>
            </button>
        </form>

        <div id="result" class="hidden p-8 bg-green-50 text-center border-t border-green-100">
            <p class="text-green-800 font-black uppercase italic">PDF généré avec succès !</p>
            <p class="text-sm text-slate-600 mt-1">Consultez votre dossier 'Etiquettes_Pelichet' ou vos emails.</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleCustom() {
            const isCustom = document.getElementById('preset').value === "CUSTOM";
            document.getElementById('customFields').classList.toggle('hidden', !isCustom);
        }
    </script>
</body>
</html>
