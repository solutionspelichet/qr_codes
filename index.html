<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    
    <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-slate-700 mb-1">Format d'étiquette</label>
        <select id="preset" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white">
            <optgroup label="Avery">
                <option value="AVERY_L7159">Avery L7159 (3x8 - 63.5x33.9mm)</option>
                <option value="AVERY_L7160">Avery L7160 (3x7 - 63.5x38.1mm)</option>
            </optgroup>
            <optgroup label="Herma">
                <option value="HERMA_4676">Herma 4676 (3x8 - 70x29.7mm)</option>
                <option value="HERMA_4457">Herma 4457 (4x10 - 48.3x25.4mm)</option>
                <option value="HERMA_4270">Herma 4270 (2x4 - 99.1x67.7mm)</option>
            </optgroup>
            <optgroup label="Autre">
                <option value="SINGLE_ROLL">Imprimante Thermique (50x30mm)</option>
            </optgroup>
        </select>
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Afficher le texte ?</label>
        <select id="showText" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white">
            <option value="true">Oui</option>
            <option value="false">Non</option>
        </select>
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Position du texte</label>
        <select id="textPos" class="w-full p-2.5 border border-slate-300 rounded-lg bg-white">
            <option value="dessous">Dessous le code</option>
            <option value="dessus">Dessus le code</option>
        </select>
    </div>
</div>
