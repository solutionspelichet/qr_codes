<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pelichet | Logistics Labels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex items-center justify-center font-sans">
    <div class="max-w-xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <div class="bg-[#002e5d] p-8 text-white text-center font-black italic text-3xl uppercase tracking-tighter">PELICHET</div>
        <form id="labelForm" class="p-8 space-y-5">
            <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer shadow-sm">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Modèle d'Étiquette</label>
                    <select id="preset" class="w-full p-3 bg-slate-50 border rounded-xl outline-none" onchange="toggleCustom()">
                        <option value="HERMA_4427">HERMA 4427 (2x16 - 105x18.5mm)</option>
                        <option value="HERMA_4270">HERMA 4270 (2x4 - 99.1x67.7mm)</option>
                        <option value="HERMA_4676">HERMA 4676 (3x8 - 70x29.7mm)</option>
                        <option value="AVERY_L7159">AVERY L7159 (3x8 - 63.5x33.9mm)</option>
                        <option value="CUSTOM">-- SUR MESURE --</option>
                    </select>
                </div>

                <div id="customFields" class="col-span-2 hidden grid grid-cols-4 gap-2 p-3 bg-blue-50 rounded-xl">
    <div><label class="text-[9px] font-bold">L mm</label><input type="number" step="0.1" id="custW" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">H mm</label><input type="number" step="0.1" id="custH" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">Col</label><input type="number" id="custCols" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">Lig</label><input type="number" id="custRows" class="w-full p-2 text-xs border rounded"></div>
    
    <div><label class="text-[9px] font-bold">Marge Haut mm</label><input type="number" step="0.1" id="custMarginT" value="0" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">Marge Bas mm</label><input type="number" step="0.1" id="custMarginB" value="0" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">Marge Gauche mm</label><input type="number" step="0.1" id="custMarginL" value="0" class="w-full p-2 text-xs border rounded"></div>
    <div><label class="text-[9px] font-bold">Marge Droite mm</label><input type="number" step="0.1" id="custMarginR" value="0" class="w-full p-2 text-xs border rounded"></div>
</div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Type Code</label>
                    <select id="type" class="w-full p-3 bg-slate-50 border rounded-xl">
                        <option value="Code128">Barcode 128</option>
                        <option value="QR">QR Code</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Texte</label>
                    <select id="textPos" class="w-full p-3 bg-slate-50 border rounded-xl">
                        <option value="dessous">Dessous</option>
                        <option value="dessus">Dessus</option>
                        <option value="none">Aucun</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-blue-600 uppercase font-black underline">Email de réception</label>
                    <input type="email" id="userEmail" class="w-full p-3 border border-blue-200 rounded-xl outline-none" placeholder="nom@pelichet.ch">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-[#002e5d] text-white font-bold py-4 rounded-xl hover:bg-blue-900 shadow-lg transition-transform active:scale-95">
                <span id="btnText">GÉNÉRER LE PDF</span>
            </button>
        </form>

        <!-- Zone de Succès -->
        <div id="result" class="hidden p-6 bg-green-50 text-center border-t border-green-200">
            <p class="font-bold text-green-800 mb-4">✅ PDF Généré avec succès !</p>
            <a id="driveLink" href="#" target="_blank" class="inline-block bg-green-600 text-white font-bold py-2 px-6 rounded-lg shadow hover:bg-green-700">TÉLÉCHARGER LE PDF</a>
            <p id="emailStatus" class="text-xs text-slate-500 mt-3 font-medium"></p>
        </div>

        <!-- Zone d'Erreur -->
        <div id="errorBox" class="hidden p-6 bg-red-50 text-center border-t border-red-200">
            <p class="font-bold text-red-800 mb-2">❌ Une erreur est survenue</p>
            <p id="errorText" class="text-xs text-red-600 font-mono"></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>function toggleCustom(){document.getElementById('customFields').classList.toggle('hidden', document.getElementById('preset').value !== "CUSTOM");}</script>
</body>
</html>
