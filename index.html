<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pelichet | Générateur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden">
        <div class="bg-[#002e5d] p-6 text-white text-center font-bold text-2xl italic">PELICHET</div>
        <form id="labelForm" class="p-8 space-y-4">
            <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-xs font-bold text-slate-400 uppercase">Format étiquette</label>
                    <select id="preset" class="w-full p-2 border rounded-lg">
                        <option value="AVERY_L7159">Avery L7159 (3x8)</option>
                        <option value="AVERY_L7160">Avery L7160 (3x7)</option>
                        <option value="HERMA_4270">Herma 4270 (2x4)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Type</label>
                    <select id="type" class="w-full p-2 border rounded-lg">
                        <option value="Code128">Code-barres</option>
                        <option value="QR">QR Code</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Texte</label>
                    <select id="showText" class="w-full p-2 border rounded-lg">
                        <option value="true">Oui</option>
                        <option value="false">Non</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-xs font-bold text-slate-400 uppercase">Position texte</label>
                    <select id="textPos" class="w-full p-2 border rounded-lg">
                        <option value="dessous">Dessous</option>
                        <option value="dessus">Dessus</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-xs font-bold text-blue-600 uppercase">Email de réception</label>
                    <input type="email" id="userEmail" class="w-full p-2 border border-blue-200 rounded-lg" placeholder="exemple@pelichet.ch">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-[#002e5d] text-white font-bold py-3 rounded-xl hover:bg-blue-900 transition">
                <span id="btnText">GÉNÉRER PDF</span>
            </button>
        </form>
        <div id="result" class="hidden p-6 bg-green-50 text-center border-t">
            <p class="text-green-700 font-bold">PDF envoyé !</p>
            <a id="driveLink" href="#" target="_blank" class="text-blue-600 underline text-sm">Voir sur Drive</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
